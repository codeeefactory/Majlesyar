services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${APP_IMAGE:-majlesyar:latest}
    restart: unless-stopped
    env_file:
      - ${APP_ENV_FILE:-.env.production}
    environment:
      USE_POSTGRES: "1"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB:-majlesyar}
      POSTGRES_USER: ${POSTGRES_USER:-majlesyar}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env.production}
      DJANGO_MEDIA_ROOT: /app/media
    ports:
      - "${HOST_PORT:-80}:8000"
    volumes:
      - media_data:/app/media
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import json, urllib.request, sys; response = urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health/', timeout=4); payload = json.load(response); sys.exit(0 if response.status == 200 and payload.get('ok') else 1)",
        ]
      interval: 30s
      timeout: 5s
      start_period: 60s
      retries: 3

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-majlesyar}
      POSTGRES_USER: ${POSTGRES_USER:-majlesyar}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env.production}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-majlesyar} -d ${POSTGRES_DB:-majlesyar}"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  media_data:
