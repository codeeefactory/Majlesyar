# Netlify configuration for SPA routing and caching

[build]
  publish = "dist"
  command = "npm run build"

# SPA fallback - all routes serve index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Cache hashed assets for 1 year (immutable)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# HTML should not be cached
[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "max-age=0, must-revalidate"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "max-age=0, must-revalidate"

# SEO files - short cache with stale-while-revalidate
[[headers]]
  for = "/robots.txt"
  [headers.values]
    Cache-Control = "max-age=3600, stale-while-revalidate=86400"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Cache-Control = "max-age=3600, stale-while-revalidate=86400"
    Content-Type = "application/xml"
