global:
  scrape_interval: 30s
  evaluation_interval: 30s

rule_files:
  - /etc/prometheus/alerts.d/majlesyar-geodns-alerts.yml

scrape_configs:
  - job_name: probe_iran
    static_configs:
      - targets:
          - probe-ir.example.internal:9100

  - job_name: probe_global
    static_configs:
      - targets:
          - probe-global.example.internal:9100

  - job_name: dns_nodes
    static_configs:
      - targets:
          - ns1.majlesyar.com:9100
          - ns2.majlesyar.com:9100

  - job_name: origins
    static_configs:
      - targets:
          - ir-origin.majlesyar.com:9100
          - global-origin.majlesyar.com:9100
          - maintenance-origin.majlesyar.com:9100
