server {
    listen 80;
    listen [::]:80;
    server_name maintenance-origin.majlesyar.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name maintenance-origin.majlesyar.com;

    ssl_certificate /etc/letsencrypt/live/majlesyar.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/majlesyar.com/privkey.pem;

    root /var/www/majlesyar-maintenance;
    index index.html;

    add_header Cache-Control "no-store" always;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
